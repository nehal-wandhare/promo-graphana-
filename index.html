<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Portfolio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
  background-size: 600% 600%;
  animation: bgMove 15s ease infinite;
  color: white;
  overflow: hidden;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Center layout */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Heading */
h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

/* Typing animation */
.typing {
  font-size: 1.5rem;
  color: #00ffe1;
  border-right: 2px solid;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(40, end) forwards, blink 1s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 320px }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* Cards */
.cards {
  display: flex;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 260px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.4s;
  box-shadow: 0 0 10px rgba(0,255,225,0.1);
}

/* Glow hover */
.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,225,0.6);
}

/* Buttons */
.btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: linear-gradient(45deg, #00ffe1, #00c3ff);
  color: black;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* Floating particles */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #00ffe1;
  border-radius: 50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}

</style>
</head>

<body>

<div class="container">

  <h1>🚀 DevOps Engineer</h1>
  <div class="typing">Cloud | Kubernetes | CI/CD | Monitoring</div>

  <div class="cards">

    <div class="card">
      <h2>Your Name</h2>
      <p>DevOps Engineer passionate about automation & cloud</p>
      <button class="btn">View Resume</button>
    </div>

    <div class="card">
      <h3>Skills</h3>
      <p>Docker, Kubernetes, AWS, Terraform, Jenkins, ArgoCD</p>
    </div>

    <div class="card">
      <h3>Projects</h3>
      <p>KEDA + Karpenter + EKS + Monitoring Stack</p>
    </div>

  </div>

</div>

<!-- Particles -->
<script>
for (let i = 0; i < 50; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
