apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: frontend-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment

  updatePolicy:
    updateMode: "Auto"   # or "Off"

  resourcePolicy:
    containerPolicies:
    - containerName: frontend
      minAllowed:
        cpu: 100m
        memory: 100Mi
      maxAllowed:
        cpu: 500m
        memory: 500Mi