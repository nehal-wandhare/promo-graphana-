name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Login to DockerHub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 3: Build Docker Image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-portfolio:latest .

    # Step 4: Push Image
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-portfolio:latest

    # Step 5: Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    # Step 6: Deploy to Kubernetes
    - name: Deploy to K8s
      run: |
        kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/devops-portfolio:latest
        kubectl rollout restart deployment frontend-deployment
