name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-portfolio:latest .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-portfolio:latest

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/devops-portfolio:latest
        kubectl rollout restart deployment frontend-deployment
